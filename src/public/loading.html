<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="5">
  <title>OpenClaw — Starting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { text-align: center; max-width: 400px; padding: 2rem; }
    .logo { font-size: 3rem; animation: bounce 1.2s infinite; display: inline-block; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    h1 { font-size: 1.4rem; margin: 1.2rem 0 0.5rem; }
    p { color: #888; font-size: 0.95rem; }
    .dot { animation: blink 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">🦞</span>
    <h1>OpenClaw is starting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></h1>
    <p>The gateway is initializing. This page will refresh automatically.</p>
  </div>
</body>
</html>
