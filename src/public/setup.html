<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; }
    nav { display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.5rem; border-bottom: 1px solid #1e1e1e; }
    nav .logo { font-size: 1.5rem; }
    nav h1 { font-size: 1.1rem; font-weight: 600; }
    nav a { margin-left: auto; font-size: 0.85rem; color: #888; text-decoration: none; }
    nav a:hover { color: #e5e5e5; }
    .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
    .status-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .badge { padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
    .badge.ready { background: #14532d; color: #86efac; }
    .badge.starting { background: #1c1917; color: #a8a29e; }
    .badge.configured { background: #1e3a5f; color: #93c5fd; }
    .badge.not-configured { background: #2d1515; color: #fca5a5; }
    h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: #ccc; }
    .section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.35rem; }
    input[type=text], input[type=password], select { width: 100%; padding: 0.55rem 0.75rem; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 0.95rem; outline: none; }
    input:focus, select:focus { border-color: #f97316; }
    .hint { font-size: 0.78rem; color: #666; margin-top: 0.3rem; }
    .btn { padding: 0.6rem 1.2rem; background: #f97316; border: none; border-radius: 8px; color: #fff; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #ea6c0a; }
    .btn.secondary { background: #2a2a2a; color: #ccc; }
    .btn.secondary:hover { background: #333; }
    .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; border-radius: 10px; font-size: 0.9rem; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.success { background: #14532d; color: #86efac; }
    .toast.error { background: #450a0a; color: #fca5a5; }
    .toast.show { opacity: 1; }
    .openclaw-link { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.6rem 1.2rem; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; color: #f97316; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
    .openclaw-link:hover { border-color: #f97316; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">🦞</span>
    <h1>OpenClaw Setup</h1>
    <a href="/setup/logout">Sign out</a>
  </nav>

  <div class="container">
    <div class="status-bar" id="statusBar">
      <span class="badge starting">Gateway: checking...</span>
      <span class="badge starting">Config: checking...</span>
    </div>

    <div class="section">
      <h2>AI Provider</h2>
      <div class="field">
        <label for="provider">Provider</label>
        <select id="provider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Google Gemini</option>
          <option value="custom">Custom (OpenAI-compatible)</option>
        </select>
      </div>
      <div class="field">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" placeholder="sk-...">
        <p class="hint">Stored in your Railway volume at /data — never leaves your deployment.</p>
      </div>
      <div class="field" id="baseUrlField" style="display:none">
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://api.example.com/v1">
      </div>
      <div class="field">
        <label for="model">Model (optional)</label>
        <input type="text" id="model" placeholder="e.g. claude-sonnet-4-6">
      </div>
    </div>

    <div class="section">
      <h2>Gateway</h2>
      <div class="field">
        <label>Control UI</label>
        <a class="openclaw-link" id="gatewayLink" href="/openclaw" target="_blank">
          Open OpenClaw UI ↗
        </a>
        <p class="hint">Use this to onboard channels (WhatsApp, Telegram, Slack, etc.) after configuring your AI provider above.</p>
      </div>
    </div>

    <div class="actions">
      <button class="btn" onclick="saveConfig()">Save Configuration</button>
      <button class="btn secondary" onclick="loadConfig()">Reset</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const providerSelect = document.getElementById('provider');
    const baseUrlField = document.getElementById('baseUrlField');
    providerSelect.addEventListener('change', () => {
      baseUrlField.style.display = providerSelect.value === 'custom' ? '' : 'none';
    });

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function refreshStatus() {
      try {
        const { gatewayReady, configured } = await fetch('/setup/api/status').then(r => r.json());
        const bar = document.getElementById('statusBar');
        bar.innerHTML = `
          <span class="badge ${gatewayReady ? 'ready' : 'starting'}">${gatewayReady ? 'Gateway: ready' : 'Gateway: starting'}</span>
          <span class="badge ${configured ? 'configured' : 'not-configured'}">${configured ? 'Config: saved' : 'Config: not set'}</span>
        `;
      } catch {}
    }

    async function loadConfig() {
      try {
        const cfg = await fetch('/setup/api/config').then(r => r.json());
        if (cfg.provider) providerSelect.value = cfg.provider;
        if (cfg.apiKey) document.getElementById('apiKey').value = cfg.apiKey;
        if (cfg.baseUrl) { document.getElementById('baseUrl').value = cfg.baseUrl; baseUrlField.style.display = ''; }
        if (cfg.model) document.getElementById('model').value = cfg.model;
        providerSelect.dispatchEvent(new Event('change'));
      } catch { showToast('Failed to load config', 'error'); }
    }

    async function saveConfig() {
      const body = {
        provider: providerSelect.value,
        apiKey: document.getElementById('apiKey').value.trim(),
        model: document.getElementById('model').value.trim() || undefined,
      };
      if (providerSelect.value === 'custom') {
        body.baseUrl = document.getElementById('baseUrl').value.trim();
      }
      try {
        const res = await fetch('/setup/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (res.ok) { showToast('Configuration saved!'); refreshStatus(); }
        else showToast('Save failed', 'error');
      } catch { showToast('Save failed', 'error'); }
    }

    refreshStatus();
    loadConfig();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
