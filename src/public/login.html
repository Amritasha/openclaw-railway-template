<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e5e5e5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; }
    input[type=password] { width: 100%; padding: 0.6rem 0.8rem; background: #0f0f0f; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 1rem; outline: none; }
    input[type=password]:focus { border-color: #f97316; }
    button { margin-top: 1rem; width: 100%; padding: 0.7rem; background: #f97316; border: none; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #ea6c0a; }
    .error { color: #f87171; font-size: 0.85rem; margin-top: 0.8rem; }
    .logo { font-size: 2rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🦞</div>
    <h1>OpenClaw Setup</h1>
    <p>Enter your setup password to continue.</p>
    <form method="POST" action="/setup/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
    <script>
      if (location.search.includes('error=1')) {
        const p = document.createElement('p');
        p.className = 'error';
        p.textContent = 'Incorrect password. Try again.';
        document.querySelector('form').after(p);
      }
    </script>
  </div>
</body>
</html>
